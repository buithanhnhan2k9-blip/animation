<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ | Movie Landing</title>
    <link rel="stylesheet" href="assets/trang chủ.css">
</head>
<body>

<!-- Custom Cursor -->
<div class="cursor"></div>

<!-- NAVBAR -->
<header>
    <nav class="navbar">
        <ul>
            <li><a href="#home" class="nav-link active">Trang chủ</a></li>
            <li><a href="#movies" class="nav-link">Phim</a></li>
            <li><a href="đăng kí.html" class="nav-link">Đăng Kí</a></li>
        </ul>
        <button id="toggleTheme">🌙</button>
    </nav>
</header>


<!-- HERO / TRANG CHỦ -->
<section id="home" class="hero">
    <h1 class="hero-title">PHIM BOM TẤN 2026</h1>
    <p class="hero-text">🎬 Khởi chiếu toàn cầu – Trải nghiệm điện ảnh đỉnh cao</p>

    <!-- Marquee -->
    <div class="marquee">
        <span>🔥 Đặt vé sớm – Giảm giá 20% – Số lượng có hạn 🔥</span>
    </div>

    <!-- CTA -->
    <button class="cta">XEM NGAY</button>
</section>
<section id="movies" class="movies">
    <h2 class="section-title">PHIM ĐANG HOT</h2>

    <div class="movie-list">
        <div class="movie-card">
            <img src="assets/image/8QVDXDiOGHRcAD4oM6MXjE0osSj.webp">
            <h3>Dune: Part Two</h3>
    
        </div>

        <div class="movie-card">
            <img src="assets/image/Avatar_3_teaser.jpg">
            <h3>Avatar 3</h3>
        </div>

        <div class="movie-card">
            <img src="assets/image/5ik4ATKmNtmJU6AYD0bLm56BCVM.webp">
            <h3>Batman Beyond</h3>
            
        </div>
    </div>
</section>



<script src="assets/trang chủ.js"></script>
</body>
</html>
