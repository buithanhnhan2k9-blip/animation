<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="trang chủ.html" class="nav-link active">Trang chủ</a></li>
        </ul>

<div class="register-container">
    <h2>Đăng ký tài khoản</h2>

    <form id="registerForm">
        <div class="form-group">
            <label>Họ và tên</label>
            <input type="text" id="fullname" placeholder="Nhập họ tên">
            <span class="error"></span>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="example@gmail.com">
            <span class="error"></span>
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="Tối thiểu 6 ký tự">
            <span class="error"></span>
        </div>

        <div class="form-group">
            <label>Xác nhận mật khẩu</label>
            <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
            <span class="error"></span>
        </div>

        <button type="submit" class="btn">ĐĂNG KÝ</button>
    </form>

   
     
    </p>
</div>

<script src="assets/đăng kí.js"></script>
</body>
</html>
